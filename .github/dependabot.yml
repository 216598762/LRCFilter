version: 2
updates:
  # Python dependencies (pip)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "chore(deps)"
    versioning-strategy: increase
    ignore:
      # lyricsgenius 3.x requires Python 3.11+ (uses from typing import Self)
      - dependency-name: "lyricsgenius"
        update-types: ["version-update:semver-major"]
      # Ignore pre-release versions across all dependencies
      - update-types: ["version-update:semver-pre-release"]
    groups:
      python-deps:
        patterns:
          - "*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
    ignore:
      # Ignore pre-release versions for GitHub Actions
      - update-types: ["version-update:semver-pre-release"]
    groups:
      github-actions:
        patterns:
          - "*"

  # Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker)"
    groups:
      docker-deps:
        patterns:
          - "*"
